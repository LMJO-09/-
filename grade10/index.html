<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الصف العاشر - LMJO 09</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

<div class="container">
    <header>
        <h1>📕 الصف العاشر</h1>
        <p class="subtitle">✨ مرحباً بك في صف العاشر ✨</p>
    </header>

    <div class="grades-grid">
        <button class="grade-btn" onclick="alert('جاري تجهيز مادة الرياضيات')">📐 الرياضيات</button>
        <button class="grade-btn" onclick="alert('جاري تجهيز مادة العلوم')">🔬 العلوم</button>
        <button class="grade-btn" onclick="alert('جاري تجهيز مادة اللغة العربية')">📖 اللغة العربية</button>
        <button class="grade-btn" onclick="alert('جاري تجهيز مادة اللغة الإنجليزية')">🇬🇧 اللغة الإنجليزية</button>
        <button class="grade-btn" onclick="alert('جاري تجهيز مادة التربية الإسلامية')">🕌 التربية الإسلامية</button>
        <button class="grade-btn" onclick="alert('جاري تجهيز مادة الدراسات الاجتماعية')">🌍 الدراسات الاجتماعية</button>
    </div>

    <div style="text-align: center; margin: 30px 0;">
        <button class="grade-btn" onclick="window.location.href='../index.html'" style="background: #6c757d;">🏠 العودة للرئيسية</button>
    </div>

    <div class="assistant-section">
        <div class="assistant-header" onclick="toggleAssistant()">
            🤖 المساعد الذكي للدراسة <span>▼</span>
        </div>
        <div id="assistantContent" class="assistant-content">
            <div class="assistant-tip">
                📌 للدقة: اذكر اسم الكتاب + الوحدة + الدرس
            </div>
            <div id="chatBox" class="chat-box">
                <div class="message bot">مرحباً! أنا المساعد الذكي. اسألني عن أي درس في الصف العاشر 😊</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="userInput" placeholder="اكتب سؤالك هنا...">
                <button onclick="sendMessage()">إرسال</button>
            </div>
        </div>
    </div>
</div>

<script src="../assistant.js"></script>
<script>
    function toggleAssistant() {
        const content = document.getElementById('assistantContent');
        content.style.display = content.style.display === 'none' ? 'block' : 'none';
    }

    document.getElementById('userInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') sendMessage();
    });
</script>
</body>
</html>
