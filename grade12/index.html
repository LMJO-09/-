<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الصف الثاني ثانوي - LMJO 09</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

<div class="grade-container">
    <div class="grade-header">
        <h1>📒 الصف الثاني ثانوي</h1>
        <p>اختر حقلك أولاً</p>
    </div>

    <div class="subjects-list">
        <button class="subject-btn" onclick="showField('scientific')">🔬 الحقل الصحي</button>
        <button class="subject-btn" onclick="showField('engineering')">⚙️ الحقل الهندسي</button>
        <button class="subject-btn" onclick="showField('literary')">📚 الحقل الأدبي (لغات)</button>
        <button class="subject-btn" onclick="showField('business')">💼 حقل الأعمال (ريادي)</button>
    </div>

    <div id="materialsContainer" style="margin-top: 30px; display: none;">
        <div class="grade-header" style="background: #2a5298; margin-top: 20px;">
            <h3>📚 المواد</h3>
        </div>
        <div id="materialsList" class="subjects-list"></div>
    </div>

    <div class="back-home">
        <button class="back-btn" onclick="window.location.href='../index.html'">🏠 العودة للرئيسية</button>
    </div>
</div>

<script>
    const fields = {
        scientific: ['🔬 الأحياء', '⚛️ الكيمياء', '⚡ الفيزياء'],
        engineering: ['📐 الرياضيات البحتة', '📊 الرياضيات التطبيقية', '⚡ الفيزياء', '⚛️ الكيمياء'],
        literary: ['📖 الأدب والنصوص', '🗣️ البلاغة', '📝 القواعد', '🇫🇷 اللغة الفرنسية', '📜 التاريخ', '🗺️ الجغرافيا'],
        business: ['💰 الاقتصاد', '🏢 إدارة الأعمال', '📊 المحاسبة', '📈 الرياضيات المالية']
    };

    function showField(field) {
        const container = document.getElementById('materialsContainer');
        const materialsList = document.getElementById('materialsList');
        
        materialsList.innerHTML = '';
        
        fields[field].forEach(material => {
            const btn = document.createElement('button');
            btn.className = 'subject-btn';
            btn.textContent = material;
            btn.onclick = () => alert(`جاري تجهيز مادة ${material}`);
            materialsList.appendChild(btn);
        });
        
        container.style.display = 'block';
        container.scrollIntoView({ behavior: 'smooth' });
    }
</script>

</body>
</html>
