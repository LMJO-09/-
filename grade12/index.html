<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الصف الثاني ثانوي - LMJO 09</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

<div class="grade-container">
    <div class="grade-header">
        <h1>📒 الصف الثاني ثانوي (توجيهي)</h1>
        <p>اختر حقل الدراسة أولاً</p>
    </div>

    <div class="field-buttons">
        <button class="field-btn" onclick="showField('scientific')">🔬 الحقل الصحي</button>
        <button class="field-btn" onclick="showField('engineering')">⚙️ الحقل الهندسي</button>
        <button class="field-btn" onclick="showField('languages')">📚 حقل اللغات (شريعة وقانون)</button>
        <button class="field-btn" onclick="showField('business')">💼 حقل إدارة الأعمال</button>
    </div>

    <div id="materialsContainer" class="materials-box" style="display: none;">
        <h3 id="fieldTitle">📚 المواد</h3>
        <div id="materialsList" class="subjects-list"></div>
    </div>

    <div class="back-home">
        <button class="back-btn" onclick="window.location.href='../index.html'">🏠 العودة للرئيسية</button>
    </div>
</div>

<script>
    const fieldsData = {
        scientific: {
            title: '🔬 الحقل الصحي',
            materials: [
                '🇬🇧 اللغة الإنجليزية (متقدم) - إجباري',
                '🔬 الأحياء - إجباري',
                '⚛️ الكيمياء - إجباري',
                '🌍 علوم الأرض (اختياري) أو 📐 رياضيات متقدم (اختياري)'
            ]
        },
        engineering: {
            title: '⚙️ الحقل الهندسي',
            materials: [
                '🇬🇧 اللغة الإنجليزية (متقدم) - إجباري',
                '⚡ فيزياء - إجباري',
                '📐 رياضيات متقدم - إجباري',
                '🌍 علوم الأرض (اختياري) أو ⚛️ الكيمياء (اختياري)'
            ]
        },
        languages: {
            title: '📚 حقل اللغات (شريعة وقانون)',
            materials: [
                '🇬🇧 اللغة الإنجليزية (متقدم) - إجباري',
                '📖 اللغة العربية (تخصص) - إجباري',
                '📜 الشريعة - إجباري',
                '📜 التاريخ (اختياري) أو 🗺️ الجغرافيا (اختياري)'
            ]
        },
        business: {
            title: '💼 حقل إدارة الأعمال',
            materials: [
                '🇬🇧 اللغة الإنجليزية (متقدم) - إجباري',
                '💰 الثقافة المالية - إجباري',
                '📊 رياضيات الأعمال - إجباري',
                '🗺️ الجغرافيا (اختياري) أو 🌍 علوم الأرض (اختياري)'
            ]
        }
    };

    function showField(field) {
        const container = document.getElementById('materialsContainer');
        const fieldTitle = document.getElementById('fieldTitle');
        const materialsList = document.getElementById('materialsList');
        
        const data = fieldsData[field];
        fieldTitle.textContent = data.title;
        
        materialsList.innerHTML = '';
        data.materials.forEach(material => {
            const btn = document.createElement('button');
            btn.className = 'subject-btn';
            btn.textContent = material;
            btn.onclick = () => alert(`📖 جاري تجهيز محتوى: ${material}\n\nهذا الدرس قيد الإعداد حالياً، سيتم إضافته قريباً إن شاء الله.`);
            materialsList.appendChild(btn);
        });
        
        container.style.display = 'block';
        container.scrollIntoView({ behavior: 'smooth' });
    }
</script>

</body>
</html>
